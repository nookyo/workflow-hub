name: List Files in Workspace

on:
  workflow_call: 
    inputs:
      version:
        required: true
        type: string
        default: "2050.1.0.0"

jobs:
  list-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # Step to clone the repository

    - name: List all files in the workspace
      run: |
        echo "Listing all files in the workspace..."
        ls -la  

    - name: Update revision in pom.xml
      run: |
          echo "Updating revision value in pom.xml..."
          sed -i "s|<revision>.*</revision>|<revision>${{ github.event.inputs.version }}</revision>|" pom.xml

    - name: Show contents of pom.xml
      run: cat pom.xml
